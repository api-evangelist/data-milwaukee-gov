apis:
  - aid: data-milwaukee-gov:catalog
    name: Milwaukee Open Data CKAN Action API
    description: >-
      CKAN Action API for Milwaukee Open Data, a consistent JSON-over-HTTP interface over a catalog of 186 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://data.milwaukee.gov/api/3/action/.
    humanURL: https://data.milwaukee.gov
    baseURL: https://data.milwaukee.gov/api/3/action
