aid: data-milwaukee-gov
name: Milwaukee Open Data
description: >-
  Milwaukee Open Data is a municipal government open-data portal for United States running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 186 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
kind: government
